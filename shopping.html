<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Best Aesthetic Amazon Finds 2026 | Toolkit Pro</title>
<meta name="description" content="Discover trending aesthetic Amazon finds in beauty, decor, fashion & more. Updated daily with top picks.">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI;background:#0f0c29;color:#fff}

nav{background:#2c3de0;padding:15px;text-align:center;font-weight:bold}

.hero{text-align:center;padding:50px 20px}
.hero h1{font-size:2.2rem;color:#f093fb}

.filter-section{text-align:center;margin:20px}
.filter-btn{
background:#222;border:none;color:#fff;
padding:8px 15px;margin:5px;border-radius:20px;cursor:pointer
}
.filter-btn.active{background:#f5576c}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;padding:20px
}

.product-card{
background:#1a1a2e;border-radius:15px;
overflow:hidden;display:flex;flex-direction:column
}

.product-card img{
width:100%;height:200px;object-fit:contain;background:#fff
}

.card-body{padding:15px;flex:1}
.card-body h3{font-size:1rem;margin-bottom:8px}
.card-body p{font-size:0.85rem;color:#aaa;margin-bottom:10px}

.amazon-btn{
display:block;text-align:center;padding:10px;
background:#f5576c;color:#fff;text-decoration:none;
border-radius:10px;font-weight:bold
}

</style>
</head>

<body>

<nav>ToolKit Pro Shopping</nav>

<div class="hero">
<h1>🔥 Best Aesthetic Amazon Finds 2026</h1>
<p>Trending beauty, decor, fashion & lifestyle picks</p>
</div>

<div class="filter-section">
<button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
<button class="filter-btn" onclick="filterProducts('beauty',this)">Beauty</button>
<button class="filter-btn" onclick="filterProducts('decor',this)">Decor</button>
<button class="filter-btn" onclick="filterProducts('fashion',this)">Fashion</button>
<button class="filter-btn" onclick="filterProducts('kitchen',this)">Kitchen</button>
</div>

<p style="text-align:center;margin:10px" id="count"></p>

<div class="products-grid" id="grid"></div>

<script>

// ✅ CENTRAL PRODUCT DATA (EASY TO SCALE / API READY)
const products = [

{
title:"Skin Care Essential",
category:"beauty",
img:"/image/81OYPgiKaGL._AC_SL1500_.jpg",
link:"https://amzn.to/4tyrsq2",
desc:"Daily skincare for glowing healthy skin"
},

{
title:"Stylish Hand Bag",
category:"fashion",
img:"/image/71UsdSvfv1L._AC_SY695_.jpg",
link:"https://amzn.to/4w9Vgv8",
desc:"Elegant spacious handbag"
},

{
title:"Kitchen Oven",
category:"kitchen",
img:"/image/81KM+G4hdLL._SL1500_.jpg",
link:"https://amzn.to/3QOfkmo",
desc:"Perfect baking results every time"
},

{
title:"Aesthetic Lamp",
category:"decor",
img:"/image/51ZakvjGM0L._MCnd_AC_.jpg",
link:"https://amzn.to/4ugr3sv",
desc:"Warm cozy lighting decor"
},

{
title:"Elegant Jewelry Set",
category:"fashion",
img:"/image/71hafv7+FPL._SL1500_.jpg",
link:"https://amzn.to/4vXHYSb",
desc:"Luxury jewelry piece"
},

{
title:"Air Fryer Cooker",
category:"kitchen",
img:"/image/71m7N37l2EL._SL1500_.jpg",
link:"https://amzn.to/3OCJecN",
desc:"Healthy cooking made easy"
},

{
title:"Laptop Table",
category:"decor",
img:"/image/71D6Gr3kEpL._AC_SY535_.jpg",
link:"https://amzn.to/4mXjB2R",
desc:"Work comfortably anywhere"
},

{
title:"Floral Maxi Dress",
category:"fashion",
img:"/image/71HkhVu9R1L._AC_SY741_.jpg",
link:"https://amzn.to/426S3P3",
desc:"Elegant summer dress"
},

{
title:"Rose Spa Gift Set",
category:"beauty",
img:"/image/81avDeLCnqL._AC_SL1500_.jpg",
link:"https://amzn.to/4t1uK45",
desc:"Luxury self-care kit"
},

{
title:"Massage Gun",
category:"health",
img:"/image/715vteUmXJL._AC_SL1500_.jpg",
link:"https://amzn.to/429rKYH",
desc:"Deep tissue muscle relief"
}

];

// ✅ RENDER FUNCTION
function renderProducts(list){
const grid=document.getElementById("grid");
grid.innerHTML="";

list.forEach(p=>{
grid.innerHTML+=`
<div class="product-card" data-category="${p.category}">
<img loading="lazy" src="${p.img}" alt="${p.title}">
<div class="card-body">
<h3>${p.title}</h3>
<p>${p.desc}</p>
<a href="${p.link}" target="_blank" class="amazon-btn">View on Amazon</a>
</div>
</div>
`;
});

document.getElementById("count").innerText =
list.length + " Products Found";
}

// ✅ FILTER
function filterProducts(cat,btn){
document.querySelectorAll(".filter-btn")
.forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

if(cat==="all") renderProducts(products);
else renderProducts(products.filter(p=>p.category===cat));
}

// INIT
renderProducts(products);

</script>

</body>
</html>
