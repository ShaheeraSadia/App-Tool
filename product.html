<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Toolkit Pro</title>
    <!-- AdMob Auto-Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6309207317896311" crossorigin="anonymous"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 850px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        .ad-placeholder { background: #222; padding: 10px; border: 1px dashed #444; margin-bottom: 20px; min-height: 100px; }
        .product-img { width: 100%; max-width: 400px; border-radius: 12px; margin-bottom: 20px; }
        .amazon-btn { display: inline-block; background: #ff85a2; color: white; padding: 15px 40px; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .amazon-btn:hover { background: #ff6085; transform: scale(1.05); }
        .rec-row { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; scroll-behavior: smooth; }
        .card { min-width: 160px; background: #252525; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .card a { color: #ff85a2; text-decoration: none; font-size: 12px; border: 1px solid #ff85a2; padding: 4px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Top Ad Mob Unit -->
    <div class="ad-placeholder">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6309207317896311" data-ad-slot="2485889698" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- Product Display -->
    <img id="display-img" src="https://m.media-amazon.com/images/I/81A+Hj7Cq+L._SL1500_.jpg" class="product-img">
    <h1 id="display-title" style="color: #ff85a2;">Luxury Aesthetic Collection</h1>
    <p id="display-desc" style="color: #ccc; line-height: 1.6;">High-quality aesthetic products curated by Toolkit Pro for your professional and creative needs.</p>
    
    <a href="https://amzn.to/4vXwgqF" id="display-link" target="_blank" class="amazon-btn">Shop Now on Amazon</a>

    <!-- Recommendations -->
    <h3 style="margin-top: 40px; color: #ff85a2; border-top: 1px solid #333; padding-top: 20px;">🌟 Recommended for You</h3>
    <div class="rec-row" id="product-list">
        <!-- Products will be listed here -->
    </div>

    <!-- Bottom Ad Mob Unit -->
    <div class="ad-placeholder" style="margin-top: 30px;">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6309207317896311" data-ad-slot="2485889698" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
</div>

<script>
    const data = {
        "pizza-oven": { title: "Outdoor Pizza Oven", link: "https://amzn.to/3W9YgXz", img: "https://m.media-amazon.com/images/I/71Y+Hk-yL+L._AC_SL1500_.jpg", desc: "Make professional wood-fired pizzas in your backyard." },
        "galaxy-rose": { title: "Galaxy Glass Rose", link: "https://amzn.to/4bc9vL7", img: "https://m.media-amazon.com/images/I/71X8k+0X1TL._AC_SL1500_.jpg", desc: "A beautiful aesthetic gift for your loved ones." },
        "family-airfryer": { title: "Family Size Air Fryer", link: "https://amzn.to/3OCJecN", img: "https://m.media-amazon.com/images/I/71fV9-X4HkL._AC_SL1500_.jpg", desc: "Healthy cooking for the entire family made easy." },
        "skin-care-gift-set": { title: "Luxury Skincare Set", link: "https://amzn.to/4vXwgqF", img: "https://m.media-amazon.com/images/I/81A+Hj7Cq+L._SL1500_.jpg", desc: "Complete 56-piece spa kit for perfect skin." }
    };

    const currentPath = window.location.pathname.split("/").pop();
    if (data[currentPath]) {
        document.getElementById("display-title").innerText = data[currentPath].title;
        document.getElementById("display-desc").innerText = data[currentPath].desc;
        document.getElementById("display-link").href = data[currentPath].link;
        document.getElementById("display-img").src = data[currentPath].img;
    }

    const list = document.getElementById("product-list");
    Object.keys(data).forEach(key => {
        list.innerHTML += `<div class="card"><p style="font-size:13px;">${data[key].title}</p><a href="/products/${key}">View Item</a></div>`;
    });
</script>
</body>
</html>
