<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Toolkit Pro</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6309207317896311" crossorigin="anonymous"></script>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .ad-box { background: #252525; padding: 10px; border: 1px dashed #444; text-align: center; margin-bottom: 25px; min-height: 100px; }
        .product-flex { display: flex; flex-wrap: wrap; gap: 30px; align-items: center; }
        #main-img { width: 100%; max-width: 400px; border-radius: 15px; border: 2px solid #ff85a2; }
        .info { flex: 1; min-width: 300px; }
        #main-title { color: #ff85a2; font-size: 30px; }
        .amazon-btn { display: inline-block; background: #ff85a2; color: white; padding: 18px 45px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 18px; margin-top: 20px; transition: 0.3s; }
        .amazon-btn:hover { background: #ff6085; transform: scale(1.05); }
        .rec-row { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; }
        .card { min-width: 160px; background: #252525; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .card a { color: #ff85a2; text-decoration: none; font-size: 12px; border: 1px solid #ff85a2; padding: 4px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <!-- AdMob Top -->
    <div class="ad-box">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6309207317896311" data-ad-slot="2485889698" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="product-flex">
        <div style="flex: 1; text-align: center;">
            <img id="main-img" src="https://m.media-amazon.com/images/I/81A+Hj7Cq+L._SL1500_.jpg">
        </div>
        <div class="info">
            <h1 id="main-title">Premium Product</h1>
            <p id="main-desc" style="color: #ccc; line-height: 1.6;">Selected with care for your aesthetic lifestyle.</p>
            <a href="https://amzn.to/4vXwgqF" id="main-link" target="_blank" class="amazon-btn">Shop Now on Amazon</a>
        </div>
    </div>

    <h3 style="color: #ff85a2; margin-top: 40px; border-top: 1px solid #333; padding-top: 20px;">🌟 Recommended Deals</h3>
    <div class="rec-row" id="list"></div>

    <!-- AdMob Bottom -->
    <div class="ad-box" style="margin-top: 30px;">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-6309207317896311" data-ad-slot="2485889698" data-ad-format="auto" data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
</div>

<script>
    const products = {
        "galaxy-rose": { title: "Galaxy Glass Rose", link: "https://amzn.to/4cZ27yy", img: "https://m.media-amazon.com/images/I/71X8k+0X1TL._AC_SL1500_.jpg", desc: "A magical romantic gift with LED lights." },
        "pizza-oven": { title: "Outdoor Pizza Oven", link: "https://amzn.to/3W9YgXz", img: "https://m.media-amazon.com/images/I/71Y+Hk-yL+L._AC_SL1500_.jpg", desc: "Wood-fired taste in your own backyard." },
        "family-airfryer": { title: "Family Air Fryer", link: "https://amzn.to/3OCJecN", img: "https://m.media-amazon.com/images/I/71fV9-X4HkL._AC_SL1500_.jpg", desc: "Healthy cooking for your loved ones." },
        "skin-care-gift-set": { title: "Luxury Skincare Set", link: "https://amzn.to/4vXwgqF", img: "https://m.media-amazon.com/images/I/81A+Hj7Cq+L._SL1500_.jpg", desc: "56-piece professional spa kit." }
    };

    const path = window.location.pathname.split("/").pop();
    if (products[path]) {
        document.getElementById("main-title").innerText = products[path].title;
        document.getElementById("main-desc").innerText = products[path].desc;
        document.getElementById("main-link").href = products[path].link;
        document.getElementById("main-img").src = products[path].img;
    }

    const listDiv = document.getElementById("list");
    for (let key in products) {
        listDiv.innerHTML += `<div class="card"><p>${products[key].title}</p><a href="/products/${key}">View</a></div>`;
    }
</script>
</body>
</html>
